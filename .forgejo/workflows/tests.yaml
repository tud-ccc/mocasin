name: Tests

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10"]

    container:
      image: python:${{ matrix.python-version }}

    steps:
      - name: Install tools required by actions and system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            nodejs \
            ca-certificates \
            build-essential \
            cmake \
            libboost-dev \
            libboost-graph-dev \
            lua5.3 \
            liblua5.3-dev \
            luarocks
          rm -rf /var/lib/apt/lists/*

      - name: Upgrade Python packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Show versions
        run: |
          python --version
          pip --version
          node --version
          git --version

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build wheels
        run: |
          python -m pip wheel -w wheels ".[dev]"

      - name: Install mocasin from wheels
        run: |
          python -m pip install "mocasin[dev]" --no-index --find-links=./wheels

      - name: Run tests
        run: |
          python -m pytest

  test-plugins:
    runs-on: ubuntu-latest
    needs:
      - build-and-test

    env:
      API: https://git.cc.inf.tu-dresden.de/api/v1
      MOCASIN_BRANCH: ${{ github.head_ref || github.ref_name }}
      MOCASIN_CI_USER: ${{ secrets.MOCASIN_CI_USER }}
      MOCASIN_CI_TOKEN: ${{ secrets.MOCASIN_CI_TOKEN }}

    steps:
      #- name: Install system dependencies
      #  run: |
      #    sudo apt-get update
      #    sudo apt-get install -y jq
      #    rm -rf /var/lib/apt/lists/*
      #
      - name: Prepare plugin info and find branches
        run: |
          cat > plugins.json <<EOF
          [
            {
              "name": "maps-examples",
              "repo": "mocasin/mocasin-maps-examples",
              "workflow": "tests.yaml"
            },
            {
              "name": "gbm",
              "repo": "mocasin/mocasin-gbm",
              "workflow": "tests.yaml"
            },
            {
              "name": "fivegsim",
              "repo": "mocasin/fivegsim",
              "workflow": "tests.yaml"
            }
          ]
          EOF

          echo "[]" > plugin-runs.json

          echo "Mocasin branch: ${MOCASIN_BRANCH}"

          while IFS= read -r plugin; do
            NAME=$(echo "$plugin" | jq -r '.name')
            REPO=$(echo "$plugin" | jq -r '.repo')
            WORKFLOW=$(echo "$plugin" | jq -r '.workflow')

            PLUGIN_BRANCH="master"

            if [ "$MOCASIN_BRANCH" != "master" ] && \
               curl --fail --silent \
                 --user "${MOCASIN_CI_USER}:${MOCASIN_CI_TOKEN}" \
                 "${API}/repos/${REPO}/branches/${MOCASIN_BRANCH}" > /dev/null; then
              PLUGIN_BRANCH="$MOCASIN_BRANCH"
            fi

            echo "Selected branch for ${NAME}: ${PLUGIN_BRANCH}"

            tmp=$(mktemp)
            jq \
              --arg name "$NAME" \
              --arg repo "$REPO" \
              --arg workflow "$WORKFLOW" \
              --arg plugin_branch "$PLUGIN_BRANCH" \
              '. + [{
                name: $name,
                repo: $repo,
                workflow: $workflow,
                branch: $plugin_branch,
                run_id: null,
                url:  null,
                status: "prepared"
              }]' plugin-runs.json > "$tmp"
            mv "$tmp" plugin-runs.json
          done < <(jq -c '.[]' plugins.json)

      - name: Trigger plugin workflows
        run: |
          while IFS= read -r plugin; do
            NAME=$(echo "$plugin" | jq -r '.name')
            REPO=$(echo "$plugin" | jq -r '.repo')
            WORKFLOW=$(echo "$plugin" | jq -r '.workflow')
            PLUGIN_BRANCH=$(echo "$plugin" | jq -r '.branch')

            RUN_TOKEN="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${NAME}"

            PAYLOAD=$(printf \
              '{"ref":"%s","inputs":{"mocasin_branch":"%s"},"return_run_info":true}' \
              "$PLUGIN_BRANCH" "$MOCASIN_BRANCH")

            echo "Triggering ${NAME}"
            echo "  Repo:           ${REPO}"
            echo "  Plugin branch:  ${PLUGIN_BRANCH}"
            echo "  Mocasin branch: ${MOCASIN_BRANCH}"

            tmp_response=$(mktemp)
            HTTP_CODE=$(curl -s -o "$tmp_response" -w "%{http_code}" -X POST \
              --user "${MOCASIN_CI_USER}:${MOCASIN_CI_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches" \
              -d "${PAYLOAD}")

            if [ "$HTTP_CODE" != "201" ]; then
              echo "Failed to dispatch ${NAME}. HTTP code: ${HTTP_CODE}"
              cat "$tmp_response"
              exit 1
            fi

            RESPONSE=$(cat "$tmp_response")
            RUN_ID=$(echo "$RESPONSE" | jq -r '.id')

            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "Failed to get RUN_ID for ${NAME}"
              echo "$RESPONSE"
              exit 1
            fi

            echo "  Run ID:         ${RUN_ID}"

            tmp=$(mktemp)
            jq \
              --arg name "$NAME" \
              --argjson run_id "$RUN_ID" \
              'map(
                if .name == $name then
                  .status = "dispatched"
                  | .run_id = $run_id
                else
                  .
                end
              )' plugin-runs.json > "$tmp"
            mv "$tmp" plugin-runs.json
          done < <(jq -c '.[]' plugin-runs.json)

      - name: Show plugin workflow URLs
        run: |
          while IFS= read -r plugin; do
            NAME=$(echo "$plugin" | jq -r '.name')
            REPO=$(echo "$plugin" | jq -r '.repo')
            RUN_ID=$(echo "$plugin" | jq -r '.run_id')

            RUN_JSON=$(
              curl --fail-with-body -s \
                --user "${MOCASIN_CI_USER}:${MOCASIN_CI_TOKEN}" \
                "${API}/repos/${REPO}/actions/runs/${RUN_ID}"
            )

            RUN_URL=$(echo "$RUN_JSON" | jq -r '.html_url // "n/a"')

            echo "${NAME}: ${RUN_URL}"

            tmp=$(mktemp)
            jq \
              --arg name "$NAME" \
              --arg url "$RUN_URL" \
              'map(
                if .name == $name then
                  .url = $url
                else
                  .
                end
              )' plugin-runs.json > "$tmp"
            mv "$tmp" plugin-runs.json
          done < <(jq -c '.[]' plugin-runs.json)

      - name: Wait for plugin workflow results
        run: |
          MAX_ATTEMPTS=120
          ATTEMPT_PERIOD=60
          ATTEMPT=1

          echo "Polling plugin workflows every ${ATTEMPT_PERIOD} seconds (max ${MAX_ATTEMPTS} attempts)"

          print_summary () {
            NAME="$1"
            RUN_JSON="$2"

            RUN_URL=$(echo "$RUN_JSON" | jq -r '.html_url // "n/a"')
            CREATED=$(echo "$RUN_JSON" | jq -r '.created // "n/a"')
            STARTED=$(echo "$RUN_JSON" | jq -r '.started // "n/a"')
            STOPPED=$(echo "$RUN_JSON" | jq -r '.stopped // "n/a"')
            DURATION_NS=$(echo "$RUN_JSON" | jq -r '.duration // 0')
            STATUS=$(echo "$RUN_JSON" | jq -r '.status // "n/a"')

            DURATION_SEC=$((DURATION_NS / 1000000000))
            DURATION_MIN=$((DURATION_SEC / 60))
            DURATION_REST_SEC=$((DURATION_SEC % 60))

            echo "${NAME} summary:"
            echo "  URL:      ${RUN_URL}"
            echo "  Created:  ${CREATED}"
            echo "  Started:  ${STARTED}"
            echo "  Stopped:  ${STOPPED}"
            echo "  Duration: ${DURATION_MIN}m ${DURATION_REST_SEC}s"
            echo "  Status:   ${STATUS}"
          }

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            sleep "${ATTEMPT_PERIOD}"

            ALL_DONE=true
            ANY_FAILED=false

            while IFS= read -r plugin; do
              NAME=$(echo "$plugin" | jq -r '.name')
              REPO=$(echo "$plugin" | jq -r '.repo')
              RUN_ID=$(echo "$plugin" | jq -r '.run_id')
              CURRENT_STATUS=$(echo "$plugin" | jq -r '.status')

              if [ "$CURRENT_STATUS" = "success" ] || [ "$CURRENT_STATUS" = "failure" ]; then
                continue
              fi

              RUN_JSON=$(
                curl --fail-with-body -s \
                  --user "${MOCASIN_CI_USER}:${MOCASIN_CI_TOKEN}" \
                  "${API}/repos/${REPO}/actions/runs/${RUN_ID}"
              )

              STATUS=$(echo "$RUN_JSON" | jq -r '.status')

              if [ "$STATUS" = "waiting" ] || [ "$STATUS" = "running" ]; then
                ALL_DONE=false
              elif [ "$STATUS" = "success" ]; then
                :
              elif [ "$STATUS" = "failure" ]; then
                ANY_FAILED=true
              else
                echo "Unknown status for ${NAME}: ${STATUS}"
                print_summary "$NAME" "$RUN_JSON"
                exit 1
              fi

              tmp=$(mktemp)
              jq \
                --arg name "$NAME" \
                --arg status "$STATUS" \
                'map(
                  if .name == $name then
                    .status = $status
                  else
                    .
                  end
                )' plugin-runs.json > "$tmp"
              mv "$tmp" plugin-runs.json
            done < <(jq -c '.[]' plugin-runs.json)

            STATUS_LINE=$(
              jq -r '
                map("\(.name)=\(.status)")
                | join(", ")
              ' plugin-runs.json
            )

            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: ${STATUS_LINE}"

            if [ "$ALL_DONE" = true ]; then
              echo "All plugin workflows finished."
              # echo "Final plugin status:"
              # jq . plugin-runs.json

              while IFS= read -r plugin; do
                NAME=$(echo "$plugin" | jq -r '.name')
                REPO=$(echo "$plugin" | jq -r '.repo')
                RUN_ID=$(echo "$plugin" | jq -r '.run_id')

                RUN_JSON=$(
                  curl --fail-with-body -s \
                    --user "${MOCASIN_CI_USER}:${MOCASIN_CI_TOKEN}" \
                    "${API}/repos/${REPO}/actions/runs/${RUN_ID}"
                )

                print_summary "$NAME" "$RUN_JSON"
              done < <(jq -c '.[]' plugin-runs.json)

              if [ "$ANY_FAILED" = true ]; then
                echo "At least one plugin workflow failed."
                exit 1
              fi

              echo "All plugin workflows succeeded."
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "Timed out waiting for plugin workflows."
          jq . plugin-runs.json || true
          exit 1

  check-formatting:
    runs-on: ubuntu-latest

    container:
      image: python:3.10

    steps:
      - name: Install tools required by actions
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            nodejs \
            ca-certificates
          rm -rf /var/lib/apt/lists/*

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          python -m pip install black
          black --version

      - name: Check formatting
        run: |
          black --check .
